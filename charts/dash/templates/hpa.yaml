apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: dash-scaler
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: dash
  minReplicas: {{ max 1 (.Values.dash.minReplicas | default 1 | int) }}
  maxReplicas: {{ .Values.dash.maxReplicas | default 10}}
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 90
  - type: Pods
    pods:
      metric:
        name: custom.googleapis.com|http|uwsgi_perc_busy_workers
      target:
        type: AverageValue
        averageValue: 75
  # - type: Resource
  #   resource:
  #     name: memory
  #     target:
  #       type: Utilization
  #       averageUtilization: 75