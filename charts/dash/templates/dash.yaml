{{- $raw := .Values.dash.tag | default .Values.dash.version | default .Chart.AppVersion -}}
{{- $tag := ternary $raw (printf "v%s" $raw) (hasPrefix "v" $raw) -}}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dash
spec:
  selector:
    matchLabels:
      app: dash
  template:
    metadata:
      labels:
        app: dash
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      tolerations:
      - key: "pool"
        operator: "Equal"
        value: "{{ .Values.cluster.lightweightPool}}"
        effect: "NoSchedule"
      nodeSelector:
        cloud.google.com/gke-nodepool: {{ .Values.cluster.lightweightPool}}
      terminationGracePeriodSeconds: 10
      volumes:
      - name: dash-config-volume
        configMap:
          name: dash-config
      containers:
      - name: dash
        image: {{ .Values.cluster.dockerRegistry }}/dashonflask:{{ $tag }}
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        - containerPort: 9192
        volumeMounts:
        - name: dash-config-volume
          mountPath: /app/app/instance/
        env:
        - name: AUTH_URI
          value: {{ .Values.cluster.globalServer }}/auth
        - name: STICKY_AUTH_URL
          value: {{ .Values.cluster.globalServer }}/sticky_auth
        - name: AUTH_URL
          value: {{ .Values.cluster.globalServer }}/auth
        - name: INFO_URL
          value: {{ .Values.cluster.globalServer }}/info
        - name: PROJECT_ID
          value: {{ .Values.cluster.dataProjectName }}
        - name: AUTH_USE_REDIS
          value: "false"
        - name: SECRET_KEY
          value: "{{ .Values.dash.secretKey | required "dash.secretKey is required and should be a long random string" }}"
        - name: DASH_SETTINGS
          value: /app/app/instance/config.py
        resources:
          requests:
            memory: 700Mi
            cpu: 500m
        startupProbe:
          httpGet:
            path: /dash/
            port: 80
          failureThreshold: 30
          periodSeconds: 10
          timeoutSeconds: 3
        readinessProbe:
          httpGet:
            path: /dash/
            port: 80
          initialDelaySeconds: 5
          timeoutSeconds: 3
          periodSeconds: 60
        livenessProbe:
          httpGet:
            path: /dash/
            port: 80
          initialDelaySeconds: 15
          timeoutSeconds: 3
          periodSeconds: 60
      - name: uwsgi-exporter
        image: caveconnectome/uwsgi-export-workers:v14
        ports:
          - containerPort: 9101
        env:
        - name: UWSGI_STATS_URL
          value: "http://localhost:9192"
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
      - name: prometheus-to-sd
        image: gcr.io/google-containers/prometheus-to-sd:v0.8.0
        command: ["/monitor"]
        args:
          - --source=http://localhost:9101/metrics
          - --stackdriver-prefix=custom.googleapis.com
          - --pod-id=$(POD_ID)
          - --namespace-id=$(POD_NAMESPACE)
        env:
          - name: POD_ID
            valueFrom:
              fieldRef:
                fieldPath: metadata.uid
          - name: POD_NAME
            valueFrom:
              fieldRef:
                fieldPath: metadata.name
          - name: POD_NAMESPACE
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace
      - name: sysctl-buddy
        image: alpine:3.4
        command:
        - /bin/sh
        - -c
        - |
          while true; do
            sysctl -w net.core.somaxconn=32768
            sysctl -w net.ipv4.ip_local_port_range='1024 65535'
            sleep 100
          done
        imagePullPolicy: IfNotPresent
        securityContext:
          privileged: true
        resources:
          requests:
            memory: 10Mi
            cpu: 5m